<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frank — Creative Critic</title>
  <style>
    /* ── Paste this into your stylesheet. Style it however you want. ── */
    #frank-chat {
      display: flex;
      flex-direction: column;
      height: 520px;
      max-width: 620px;
      border: 1px solid #222;
      border-radius: 12px;
      overflow: hidden;
      font-family: inherit;
      background: #fff;
    }
    #frank-header {
      padding: 14px 18px;
      background: #111;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    #frank-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fafafa;
    }
    .frank-msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.55;
    }
    .frank-msg.user  { align-self: flex-end; background: #111; color: #fff; }
    .frank-msg.agent { align-self: flex-start; background: #fff; color: #111; border: 1px solid #e0e0e0; }
    #frank-input-row { display: flex; border-top: 1px solid #e0e0e0; background: #fff; }
    #frank-input {
      flex: 1;
      border: none;
      padding: 14px 16px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      background: transparent;
    }
    #frank-send {
      border: none;
      padding: 14px 20px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    #frank-send:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>

<!-- Drop this anywhere on your page -->
<div id="frank-chat">
  <div id="frank-header">FRANK — Creative Critic</div>
  <div id="frank-messages"></div>
  <div id="frank-input-row">
    <input id="frank-input" type="text" placeholder="Tell Frank what you're working on..." />
    <button id="frank-send">Send</button>
  </div>
</div>

<script>
  // ── Config (change nothing except the user_id if you want per-visitor sessions) ──
  const API      = 'https://api.agentstandard.ai/v1/chat';
  const API_KEY  = 'david-001';
  function getUserId() {
    let id = localStorage.getItem('frank_uid');
    if (!id) { id = 'v-' + Math.random().toString(36).slice(2, 10); localStorage.setItem('frank_uid', id); }
    return id;
  }
  const USER_ID = getUserId();

  const msgs  = document.getElementById('frank-messages');
  const input = document.getElementById('frank-input');
  const btn   = document.getElementById('frank-send');

  function addMsg(role, text) {
    const el = document.createElement('div');
    el.className = `frank-msg ${role}`;
    el.textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  async function send() {
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    btn.disabled = true;
    addMsg('user', message);
    const placeholder = addMsg('agent', '...');

    try {
      const res  = await fetch(API, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
        body:    JSON.stringify({ user_id: USER_ID, message }),
      });
      const data = await res.json();
      placeholder.textContent = data.response || data.error || 'No response.';
    } catch {
      placeholder.textContent = 'Something went wrong. Try again.';
    }

    btn.disabled = false;
    input.focus();
  }

  btn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  // Opening line
  addMsg('agent', "What are you working on? Don't soften it.");
</script>

</body>
</html>
