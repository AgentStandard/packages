<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- V2: Simpler, bolder — more logo-appropriate, works small -->
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer circle frame — astronomical atlas style -->
  <circle cx="80" cy="80" r="72" fill="none" stroke="#1a2a3a" stroke-width="0.5" opacity="0.5"/>
  <circle cx="80" cy="80" r="68" fill="none" stroke="#1a2a3a" stroke-width="0.3" opacity="0.3"/>

  <!-- Minimalist constellation figure -->
  <!-- Head -->
  <circle cx="80" cy="32" r="10" fill="none" stroke="#5a8ab0" stroke-width="1" opacity="0.8"/>

  <!-- Neck to chest -->
  <line x1="80" y1="42" x2="80" y2="68" stroke="#5a8ab0" stroke-width="1" opacity="0.7"/>

  <!-- Shoulders -->
  <line x1="55" y1="58" x2="105" y2="58" stroke="#5a8ab0" stroke-width="1" opacity="0.7"/>

  <!-- Left arm angled down -->
  <line x1="55" y1="58" x2="40" y2="90" stroke="#5a8ab0" stroke-width="1" opacity="0.6"/>

  <!-- Right arm REACHING UP — the signature gesture -->
  <line x1="105" y1="58" x2="128" y2="28" stroke="#5a8ab0" stroke-width="1.2" opacity="0.9"/>

  <!-- Hip -->
  <line x1="68" y1="105" x2="92" y2="105" stroke="#5a8ab0" stroke-width="1" opacity="0.6"/>
  <!-- Waist -->
  <line x1="80" y1="68" x2="80" y2="105" stroke="#5a8ab0" stroke-width="1" opacity="0.7"/>
  <!-- Legs -->
  <line x1="68" y1="105" x2="60" y2="140" stroke="#5a8ab0" stroke-width="1" opacity="0.6"/>
  <line x1="92" y1="105" x2="98" y2="140" stroke="#5a8ab0" stroke-width="1" opacity="0.6"/>

  <!-- Joint dots -->
  <circle cx="55" cy="58" r="2.5" fill="#7ab0d4" opacity="0.9"/>
  <circle cx="105" cy="58" r="2.5" fill="#7ab0d4" opacity="0.9"/>
  <circle cx="40" cy="90" r="2" fill="#7ab0d4" opacity="0.7"/>
  <circle cx="128" cy="28" r="2.5" fill="#7ab0d4" opacity="0.9"/>
  <circle cx="68" cy="105" r="2" fill="#7ab0d4" opacity="0.7"/>
  <circle cx="92" cy="105" r="2" fill="#7ab0d4" opacity="0.7"/>
  <circle cx="60" cy="140" r="1.5" fill="#7ab0d4" opacity="0.5"/>
  <circle cx="98" cy="140" r="1.5" fill="#7ab0d4" opacity="0.5"/>

  <!-- GOLD STAR — chest -->
  <g filter="url(#glow2)" transform="translate(80, 75)">
    <polygon points="0,-8 1.9,-2.8 7.6,-2.5 3.1,1.4 4.7,7.2 0,4 -4.7,7.2 -3.1,1.4 -7.6,-2.5 -1.9,-2.8"
      fill="#f0c94a"/>
  </g>

  <!-- GOLD STAR near reaching hand — destination -->
  <g filter="url(#glow2)" transform="translate(136, 20)">
    <polygon points="0,-6 1.4,-2 5.7,-1.9 2.3,1 3.5,5.4 0,3 -3.5,5.4 -2.3,1 -5.7,-1.9 -1.4,-2"
      fill="#f0c94a" opacity="0.6"/>
  </g>

  <!-- Tiny background stars -->
  <circle cx="25" cy="25" r="1" fill="#7ab0d4" opacity="0.4"/>
  <circle cx="140" cy="55" r="0.8" fill="#7ab0d4" opacity="0.3"/>
  <circle cx="20" cy="110" r="0.8" fill="#7ab0d4" opacity="0.3"/>
  <circle cx="148" cy="120" r="0.7" fill="#7ab0d4" opacity="0.3"/>
  <circle cx="50" cy="148" r="0.8" fill="#7ab0d4" opacity="0.3"/>
</svg>
