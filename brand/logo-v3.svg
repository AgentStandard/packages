<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- V3: Dark background, gold-forward — premium, works as app icon or favicon -->
  <defs>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#060e14"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="120" height="120" rx="24" fill="url(#bg3)"/>

  <!-- Subtle outer ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#1e3a4f" stroke-width="0.6" opacity="0.8"/>

  <!-- Constellation figure — smaller, centered -->
  <!-- Head -->
  <circle cx="60" cy="28" r="7" fill="none" stroke="#4a7fa0" stroke-width="0.8" opacity="0.9"/>

  <!-- Body -->
  <line x1="60" y1="35" x2="60" y2="72" stroke="#4a7fa0" stroke-width="0.8" opacity="0.8"/>
  <!-- Shoulders -->
  <line x1="42" y1="48" x2="78" y2="48" stroke="#4a7fa0" stroke-width="0.8" opacity="0.8"/>
  <!-- Left arm down -->
  <line x1="42" y1="48" x2="30" y2="70" stroke="#4a7fa0" stroke-width="0.8" opacity="0.7"/>
  <!-- Right arm UP — strong angle -->
  <line x1="78" y1="48" x2="96" y2="25" stroke="#f0c94a" stroke-width="1" opacity="0.8"/>
  <!-- Hips -->
  <line x1="52" y1="82" x2="68" y2="82" stroke="#4a7fa0" stroke-width="0.8" opacity="0.7"/>
  <line x1="60" y1="72" x2="60" y2="82" stroke="#4a7fa0" stroke-width="0.8" opacity="0.7"/>
  <!-- Legs -->
  <line x1="52" y1="82" x2="46" y2="105" stroke="#4a7fa0" stroke-width="0.8" opacity="0.6"/>
  <line x1="68" y1="82" x2="72" y2="105" stroke="#4a7fa0" stroke-width="0.8" opacity="0.6"/>

  <!-- Joint dots -->
  <circle cx="42" cy="48" r="2" fill="#6ab0d4" opacity="0.9"/>
  <circle cx="78" cy="48" r="2" fill="#f0c94a" opacity="0.9"/>
  <circle cx="30" cy="70" r="1.5" fill="#6ab0d4" opacity="0.7"/>
  <circle cx="96" cy="25" r="2" fill="#f0c94a" opacity="0.9"/>
  <circle cx="52" cy="82" r="1.5" fill="#6ab0d4" opacity="0.7"/>
  <circle cx="68" cy="82" r="1.5" fill="#6ab0d4" opacity="0.7"/>

  <!-- GOLD STAR — chest, prominent -->
  <g filter="url(#glow3)" transform="translate(60, 58)">
    <polygon points="0,-7 1.7,-2.4 6.7,-2.2 2.7,1.2 4.1,6.3 0,3.5 -4.1,6.3 -2.7,1.2 -6.7,-2.2 -1.7,-2.4"
      fill="#f0c94a"/>
  </g>

  <!-- DESTINATION STAR — near outstretched hand -->
  <g filter="url(#glow3)" transform="translate(100, 18)">
    <polygon points="0,-5 1.2,-1.7 4.8,-1.5 1.9,0.9 3,4.5 0,2.5 -3,4.5 -1.9,0.9 -4.8,-1.5 -1.2,-1.7"
      fill="#f0c94a" opacity="0.85"/>
  </g>

  <!-- Tiny stars scattered -->
  <circle cx="18" cy="18" r="0.8" fill="#6ab0d4" opacity="0.5"/>
  <circle cx="15" cy="75" r="0.6" fill="#6ab0d4" opacity="0.4"/>
  <circle cx="108" cy="80" r="0.6" fill="#6ab0d4" opacity="0.3"/>
  <circle cx="35" cy="110" r="0.7" fill="#6ab0d4" opacity="0.4"/>
  <circle cx="95" cy="108" r="0.6" fill="#6ab0d4" opacity="0.3"/>
  <circle cx="110" cy="45" r="0.5" fill="#f0c94a" opacity="0.3"/>
</svg>
