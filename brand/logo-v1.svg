<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c94a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: none (transparent) -->

  <!-- Constellation lines — body skeleton -->
  <!-- Spine -->
  <line x1="100" y1="60" x2="100" y2="160" stroke="#6a8caf" stroke-width="0.8" opacity="0.6"/>
  <!-- Shoulders -->
  <line x1="70" y1="85" x2="130" y2="85" stroke="#6a8caf" stroke-width="0.8" opacity="0.6"/>
  <!-- Left arm down -->
  <line x1="70" y1="85" x2="55" y2="130" stroke="#6a8caf" stroke-width="0.8" opacity="0.6"/>
  <!-- Right arm reaching UP -->
  <line x1="130" y1="85" x2="155" y2="45" stroke="#6a8caf" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="45" x2="168" y2="22" stroke="#6a8caf" stroke-width="0.8" opacity="0.5"/>
  <!-- Hips -->
  <line x1="85" y1="145" x2="115" y2="145" stroke="#6a8caf" stroke-width="0.8" opacity="0.6"/>
  <!-- Left leg -->
  <line x1="85" y1="145" x2="75" y2="195" stroke="#6a8caf" stroke-width="0.8" opacity="0.6"/>
  <!-- Right leg -->
  <line x1="115" y1="145" x2="122" y2="195" stroke="#6a8caf" stroke-width="0.8" opacity="0.6"/>
  <!-- Ribcage cross -->
  <line x1="78" y1="100" x2="122" y2="110" stroke="#6a8caf" stroke-width="0.6" opacity="0.4"/>
  <line x1="78" y1="110" x2="122" y2="100" stroke="#6a8caf" stroke-width="0.6" opacity="0.4"/>

  <!-- Constellation dots — joints -->
  <circle cx="100" cy="60" r="2.5" fill="#a8c4e0" opacity="0.9"/> <!-- neck -->
  <circle cx="70" cy="85" r="2" fill="#a8c4e0" opacity="0.8"/> <!-- left shoulder -->
  <circle cx="130" cy="85" r="2" fill="#a8c4e0" opacity="0.8"/> <!-- right shoulder -->
  <circle cx="55" cy="130" r="2" fill="#a8c4e0" opacity="0.7"/> <!-- left elbow -->
  <circle cx="155" cy="45" r="2" fill="#a8c4e0" opacity="0.8"/> <!-- right elbow -->
  <circle cx="168" cy="22" r="2" fill="#a8c4e0" opacity="0.6"/> <!-- right hand reaching -->
  <circle cx="85" cy="145" r="2" fill="#a8c4e0" opacity="0.7"/> <!-- left hip -->
  <circle cx="115" cy="145" r="2" fill="#a8c4e0" opacity="0.7"/> <!-- right hip -->
  <circle cx="75" cy="195" r="2" fill="#a8c4e0" opacity="0.6"/> <!-- left foot -->
  <circle cx="122" cy="195" r="2" fill="#a8c4e0" opacity="0.6"/> <!-- right foot -->
  <circle cx="100" cy="160" r="2" fill="#a8c4e0" opacity="0.7"/> <!-- lower spine -->

  <!-- Head: circle -->
  <circle cx="100" cy="45" r="14" fill="none" stroke="#6a8caf" stroke-width="0.8" opacity="0.7"/>
  <circle cx="100" cy="45" r="2" fill="#a8c4e0" opacity="0.5"/>

  <!-- Gold star in chest — the point -->
  <g filter="url(#glow)" transform="translate(100, 108)">
    <polygon points="0,-9 2.1,-3 8.6,-2.8 3.5,1.6 5.3,8.1 0,4.5 -5.3,8.1 -3.5,1.6 -8.6,-2.8 -2.1,-3"
      fill="#f0c94a" opacity="0.95"/>
  </g>

  <!-- Small star near reaching hand — destination -->
  <g filter="url(#glow)" transform="translate(172, 16)">
    <polygon points="0,-5 1.2,-1.7 4.8,-1.6 2,0.9 3,4.6 0,2.6 -3,4.6 -2,0.9 -4.8,-1.6 -1.2,-1.7"
      fill="#f0c94a" opacity="0.7"/>
  </g>

  <!-- Tiny scattered stars background -->
  <circle cx="30" cy="30" r="0.8" fill="#a8c4e0" opacity="0.5"/>
  <circle cx="170" cy="60" r="0.8" fill="#a8c4e0" opacity="0.4"/>
  <circle cx="20" cy="100" r="0.6" fill="#a8c4e0" opacity="0.4"/>
  <circle cx="185" cy="130" r="0.6" fill="#a8c4e0" opacity="0.3"/>
  <circle cx="40" cy="170" r="0.7" fill="#a8c4e0" opacity="0.4"/>
  <circle cx="160" cy="180" r="0.6" fill="#a8c4e0" opacity="0.3"/>
  <circle cx="15" cy="55" r="0.5" fill="#a8c4e0" opacity="0.3"/>
</svg>
